<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 変身サイネージ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ffffff;
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #333333;
            --border-color: #444444;
        }
        body {
            font-family: "Sawarabi Mincho", "Noto Serif JP", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
            letter-spacing: 0.1em;
        }
        h1 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-weight: 400;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            width: 100%;
            max-width: 800px;
            text-align: center;
            font-size: 2rem;
        }
        .camera-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-color: #000;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 2.5rem;
        }
        #shutter-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        .flash-active {
            animation: shutter-anim 0.4s ease-out;
        }
        @keyframes shutter-anim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .controls {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        button, label.file-upload-btn, .action-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            width: 100px;
            height: 100px;
            font-size: 1.8rem;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        button:hover, label.file-upload-btn:hover, .action-btn:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        button:active, label.file-upload-btn:active, .action-btn:active {
            opacity: 0.7;
        }
        #upload-btn {
            border: 4px double var(--text-color);
        }
        input[type="file"] {
            display: none;
        }
        #status {
            margin-top: 2rem;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.03);
            letter-spacing: 0.05em;
        }
        .success { color: #ffffff; }
        .error { color: #888888; border-color: #888888; }
        .loading { color: #ffffff; animation: blink 2s infinite; }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        #result-container {
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 3rem;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        #result-image {
            max-width: 100%;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        h3 {
            font-weight: 400;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #888888;
        }

        /* --- モーダルスタイル --- */
        #privacy-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        #modal-iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: var(--bg-color);
        }

        #modal-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            min-height: 100px;
            background-color: rgba(0, 0, 0, 0.5);
        }

        #agreement-buttons {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 600px;
        }

        .agree-btn, .disagree-btn {
            flex: 1;
            width: auto;
            min-width: 180px;
            height: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 0.15em;
        }

        .agree-btn {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .agree-btn:hover {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .disagree-btn {
            background-color: transparent;
            color: #888888;
            border-color: #888888;
        }

        .disagree-btn:hover {
            background-color: #888888;
            color: var(--bg-color);
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            #modal-content {
                width: 95%;
                height: 90vh;
                top: 50%;
            }
            
            #modal-footer {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            
            #agreement-buttons {
                flex-direction: column;
                width: 100%;
                gap: 1rem;
            }
            
            .agree-btn, .disagree-btn {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>
<body>

    <h1>A I   T R A N S F O R M</h1>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="shutter-flash"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="controls">
        <button id="start-camera-btn" title="Start Camera">
            <i class="fas fa-camera"></i>
        </button>
        
        <button id="capture-btn" style="display:none;" title="Capture">
            <i class="fas fa-camera"></i>
        </button>
        
        <label class="file-upload-btn" title="Select File">
            <i class="fas fa-folder-open"></i>
            <input type="file" id="file-input" accept="image/png, image/jpeg">
        </label>
        
        <button id="white-bg-btn" style="display: none;" title="Remove Background">
            <i class="fas fa-eraser"></i>
        </button>
        
        <button id="upload-btn" style="display: none;" title="Send to AI">
            <i class="fas fa-upload"></i>
        </button>
    </div>

    <div id="status" style="display: none;"></div>

    <div id="result-container" style="display: none;">
        <h3 id="result-title">PREVIEW</h3>
        <img id="result-image">
        <br>
        <a id="download-link" class="action-btn" style="text-decoration: none; display: none; margin-top: 1rem;" title="Save Image">
            <i class="fas fa-save"></i>
        </a>
    </div>

    <!-- プライバシーポリシーモーダル（閉じるボタンなし） -->
    <div id="privacy-modal">
        <div id="modal-content">
            <iframe id="modal-iframe" src="./terms_of_service.html" loading="lazy"></iframe>
            <div id="modal-footer">
                <div id="agreement-buttons">
                    <button id="disagree-btn" class="disagree-btn" title="プライバシーポリシーに同意しない">
                        <i class="fas fa-times-circle"></i>&nbsp;同意しない
                    </button>
                    <button id="agree-btn" class="agree-btn" title="プライバシーポリシーに同意する">
                        同意する&nbsp;<i class="fas fa-check-circle"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startCameraBtn = document.getElementById('start-camera-btn');
        const captureBtn = document.getElementById('capture-btn');
        const whiteBgBtn = document.getElementById('white-bg-btn');
        const uploadBtn = document.getElementById('upload-btn');

        const privacyModal = document.getElementById('privacy-modal');
        const agreeBtn = document.getElementById('agree-btn');
        const disagreeBtn = document.getElementById('disagree-btn');
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');
        const resultContainer = document.getElementById('result-container');
        const resultImage = document.getElementById('result-image');
        const resultTitle = document.getElementById('result-title');
        const downloadLink = document.getElementById('download-link');

        // API サーバー設定
        const API_PORT = 443;
        const currentProtocol = window.location.protocol;
        const currentHostname = "optimize-frozen-creativity-hide.trycloudflare.com";
        const apiBaseUrl = `${currentProtocol}//${currentHostname}:${API_PORT}`;

        const UPLOAD_API_URL = `${apiBaseUrl}/api/upload-face`; 
        const WHITE_BG_API_URL = `${apiBaseUrl}/api/white-bg`;

        let currentFile = null;
        let hasAgreed = false;

        async function startCamera() {
            if (!hasAgreed) {
                showStatus('まずプライバシーポリシーに同意してください', 'error');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                video.srcObject = stream;
                startCameraBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                showStatus('カメラが起動しました。', 'success');
            } catch (err) {
                console.error("カメラへのアクセスに失敗しました:", err);
                showStatus('カメラの起動に失敗しました。', 'error');
            }
        }

        function capturePhoto() {
            if (!hasAgreed) {
                showStatus('まずプライバシーポリシーに同意してください', 'error');
                return;
            }
            const flash = document.getElementById('shutter-flash');
            flash.classList.remove('flash-active');
            void flash.offsetWidth;
            flash.classList.add('flash-active');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob((blob) => {
                if (blob) {
                    currentFile = new File([blob], "captured_face.jpg", { type: "image/jpeg" });
                    updatePreview(currentFile, "撮影した写真");
                    showStatus('写真を撮影しました。', 'success');
                }
            }, 'image/jpeg', 0.9);
        }

        function updatePreview(file, title) {
            if (!hasAgreed) {
                showStatus('まずプライバシーポリシーに同意してください', 'error');
                return;
            }
            const url = URL.createObjectURL(file);
            resultImage.src = url;
            resultTitle.textContent = title + ":";
            resultContainer.style.display = 'block';
            whiteBgBtn.style.display = 'inline-block';
            uploadBtn.style.display = 'inline-block';
            
            downloadLink.href = url;
            downloadLink.download = file.name || 'image.jpg';
        }

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                if (!hasAgreed) {
                    showStatus('まずプライバシーポリシーに同意してください', 'error');
                    return;
                }
                currentFile = file;
                updatePreview(file, "選択した画像");
            }
        });

        whiteBgBtn.addEventListener('click', async () => {
            if (!hasAgreed) {
                showStatus('まずプライバシーポリシーに同意してください', 'error');
                return;
            }
            if (!currentFile) return;
            
            showStatus('背景を除去中...', 'loading');
            
            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                const response = await fetch(WHITE_BG_API_URL, {
                    method: 'POST',
                    body: formData,
                });

                if (response.ok) {
                    const blob = await response.blob();
                    currentFile = new File([blob], "processed_image.jpg", { type: "image/jpeg" });
                    updatePreview(currentFile, "背景除去後の画像");
                    downloadLink.style.display = 'inline-block';
                    showStatus('背景の除去が完了しました。', 'success');
                } else {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
            } catch (error) {
                console.error('処理エラー:', error);
                showStatus('背景除去中にエラーが発生しました。', 'error');
            }
        });

        uploadBtn.addEventListener('click', async () => {
            if (!hasAgreed) {
                showStatus('まずプライバシーポリシーに同意してください', 'error');
                return;
            }
            if (!currentFile) {
                showStatus('送信する画像がありません。', 'error');
                return;
            }
            
            showStatus('AI へ送信中...', 'loading');
            
            const formData = new FormData();
            formData.append('face_image', currentFile);

            try {
                const response = await fetch(UPLOAD_API_URL, {
                    method: 'POST',
                    body: formData,
                });

                if (response.ok) {
                    showStatus('送信成功！配信画面を見てみよう！', 'success');
                } else {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
            } catch (error) {
                console.error('送信エラー:', error);
                showStatus('送信エラーが発生しました。', 'error');
            }
        });

        // モーダル制御関数
        function openPrivacyModal() {
            privacyModal.style.display = 'flex';
            document.addEventListener('keydown', handleEscKey);
        }

        function closePrivacyModal() {
            privacyModal.style.display = 'none';
            document.removeEventListener('keydown', handleEscKey);
        }

        function handleEscKey(event) {
            if (event.key === 'Escape' && !hasAgreed) {
                // ESC キーで閉じないようにしている
                event.preventDefault();
            }
        }

        function consentGiven() {
            hasAgreed = true;
            localStorage.setItem('terms_agreed', 'true');
            localStorage.setItem('agreed_at', new Date().toISOString());
            closePrivacyModal();
            showStatus('プライバシーポリシーに同意されました。サービスをご利用ください。', 'success');
        }

        function consentDenied() {
            localStorage.removeItem('terms_agreed');
            localStorage.removeItem('agreed_at');
            closePrivacyModal();
            preventExit();
        }

        function preventExit() {
            showStatus('本サービスの利用にはプライバシーポリシーへの同意が必要です', 'error');
            startCameraBtn.disabled = true;
            captureBtn.disabled = true;
            fileInput.disabled = true;
            whiteBgBtn.disabled = true;
            uploadBtn.disabled = true;

            
            setTimeout(() => {
                openPrivacyModal();
                showStatus('再度、プライバシーポリシーの確認をお願いいたします', 'loading');
            }, 5000);
        }

        // イベントリスナー登録

        agreeBtn.addEventListener('click', consentGiven);
        disagreeBtn.addEventListener('click', consentDenied);

        function showStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = type;
            statusDiv.style.display = 'block';
            
            if(type !== 'loading') {
                setTimeout(() => { statusDiv.style.display = 'none'; }, 5000);
            }
        }

        startCameraBtn.addEventListener('click', startCamera);
        captureBtn.addEventListener('click', capturePhoto);

        // ページ読み込み時、初めての場合のみモーダルを開く
        window.addEventListener('load', () => {
            const agreed = localStorage.getItem('terms_agreed');
            if (agreed !== 'true') {
                setTimeout(() => {
                    openPrivacyModal();
                    showStatus('プライバシーポリシーにご同意いただいた後、サービスをご利用ください', 'loading');
                }, 500);
            }else{
                hasAgreed = true;
            }
        });
    </script>
</body>
</html>
